name: Build and Push Container Image

on:
  push:
    tags:
      - "container-*"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#container-}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${GITHUB_REPOSITORY,,}/comfyui" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./container_image
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest

      - name: install s5cmd
        run: |
          curl -L -o /tmp/s5cmd_2.3.0_Linux-64bit.tar.gz https://github.com/peak/s5cmd/releases/download/v2.3.0/s5cmd_2.3.0_Linux-64bit.tar.gz
          tar -xzf /tmp/s5cmd_2.3.0_Linux-64bit.tar.gz
          chmod +x s5cmd

      - name: Build Docker image for export
        run: |
          docker build -t comfyui:${{ steps.meta.outputs.version }} ./container_image

      - name: Save and compress Docker image
        run: |
          docker save comfyui:${{ steps.meta.outputs.version }} | gzip > comfyui-${{ steps.meta.outputs.version }}.tar.gz

      - name: Upload to S3
        run: |
          s5cmd cp comfyui-${{ steps.meta.outputs.version }}.tar.gz s3://comfyui-models-438465126106/docker/comfyui-${{ steps.meta.outputs.version }}.tar.gz
